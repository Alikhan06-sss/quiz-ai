<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz - Мгновенные тесты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn { transition: all 0.2s; }
        .correct { background-color: #10B981 !important; color: white; border-color: #059669; }
        .wrong { background-color: #EF4444 !important; color: white; border-color: #B91C1C; }
        .mode-active { border-bottom: 4px solid #4F46E5; color: #4F46E5; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white mb-6 p-2 rounded-2xl flex space-x-2 shadow-xl w-full max-w-2xl text-slate-400 font-bold">
        <button onclick="switchMode('student')" id="nav-student" class="flex-1 py-2 rounded-xl transition mode-active">СТУДЕНТ</button>
        <button onclick="switchMode('teacher')" id="nav-teacher" class="flex-1 py-2 rounded-xl transition">ПРЕПОДАВАТЕЛЬ</button>
    </div>

    <div id="app" class="bg-white text-slate-800 p-6 md:p-10 rounded-3xl shadow-2xl w-full max-w-2xl">
        
        <div id="name-screen">
            <h1 class="text-3xl font-black text-indigo-600 mb-2">Как тебя зовут?</h1>
            <p class="text-slate-500 mb-6">Введи имя для того чтобы начать тест.</p>
            <input type="text" id="user-name" class="w-full p-4 border-2 border-slate-100 rounded-2xl mb-4 outline-none focus:border-indigo-500" placeholder="Твое имя...">
            <button onclick="saveName()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition">ВОЙТИ</button>
        </div>

        <div id="student-list-screen" class="hidden">
            <h1 class="text-3xl font-black text-indigo-600 mb-2">Привет, <span id="player-name"></span>!</h1>
            <p class="text-slate-500 mb-6">Выбери доступный тест:</p>
            <div id="quiz-list" class="space-y-3">
                </div>
        </div>

        <div id="setup-screen" class="hidden">
            <h1 class="text-3xl font-black text-indigo-600 mb-2">Панель учителя 🧠</h1>
            <p class="text-slate-500 mb-4">Создай тест для своих учеников</p>
            <input type="password" id="secret-code" class="w-full p-4 border-2 border-slate-100 rounded-2xl mb-4 outline-none focus:border-indigo-500" placeholder="Код доступа">
            <textarea id="raw-text" class="w-full h-40 p-4 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 outline-none mb-4 resize-none" 
                placeholder="Вставь сюда текст лекции или темы..."></textarea>
            <button onclick="generate()" id="gen-btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
                СГЕНЕРИРОВАТЬ И ОПУБЛИКОВАТЬ
            </button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="progress" class="text-sm font-bold text-indigo-500 uppercase tracking-wider">Вопрос 1/5</span>
                <span id="score-live" class="text-sm font-bold text-slate-400">Счет: 0</span>
            </div>
            <h2 id="question-text" class="text-xl md:text-2xl font-bold mb-8">Загружаем вопрос...</h2>
            <div id="options-grid" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="result-screen" class="hidden text-center">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-3xl font-bold mb-2">Готово!</h2>
            <p id="final-score" class="text-xl mb-6 text-slate-600 font-medium"></p>
            
            <div class="mt-6 p-4 bg-slate-50 rounded-2xl text-left border border-slate-100">
                <p class="font-bold text-slate-400 uppercase text-xs mb-3 tracking-widest text-center">Топ результатов</p>
                <div id="leaderboard" class="space-y-2 text-sm"></div>
            </div>

            <button onclick="location.reload()" class="mt-6 bg-slate-100 text-slate-800 px-8 py-3 rounded-xl font-bold hover:bg-slate-200 transition">
                В НАЧАЛО
            </button>
        </div>
    </div>

    <script>
        let userName = "";
        let allQuizzes = JSON.parse(localStorage.getItem('quizzes')) || [];
        let quiz = [];
        let currentIdx = 0;
        let score = 0;

        function saveName() {
            const nameInput = document.getElementById('user-name').value;
            if(!nameInput) return alert("Введи свое имя!");
            userName = nameInput;
            document.getElementById('player-name').innerText = userName;
            document.getElementById('name-screen').classList.add('hidden');
            document.getElementById('student-list-screen').classList.remove('hidden');
            renderQuizList();
        }

        function switchMode(mode) {
            const isTeacher = (mode === 'teacher');
            document.getElementById('setup-screen').classList.toggle('hidden', !isTeacher);
            document.getElementById('student-list-screen').classList.toggle('hidden', isTeacher || !userName);
            document.getElementById('name-screen').classList.toggle('hidden', isTeacher || userName);
            
            document.getElementById('nav-teacher').classList.toggle('mode-active', isTeacher);
            document.getElementById('nav-student').classList.toggle('mode-active', !isTeacher);
        }

        function renderQuizList() {
            const list = document.getElementById('quiz-list');
            list.innerHTML = allQuizzes.length ? '' : '<p class="text-center text-slate-400 py-10">Тестов пока нет...</p>';
            allQuizzes.forEach((q, index) => {
                const btn = document.createElement('div');
                btn.className = "p-4 border-2 border-slate-50 rounded-2xl flex justify-between items-center hover:bg-slate-50 cursor-pointer transition";
                btn.innerHTML = `<span><b>Тест №${index+1}</b></span> <button class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold">НАЧАТЬ</button>`;
                btn.onclick = () => startQuiz(index);
                list.appendChild(btn);
            });
        }

        async function generate() {
            const code = document.getElementById('secret-code').value;
            const textInput = document.getElementById('raw-text').value;
            if(code !== "2026") return alert("Неверный код учителя!");
            if(!textInput) return alert("Вставь текст!");

            const btn = document.getElementById('gen-btn');
            btn.innerText = "ИИ ГЕНЕРИРУЕТ...";
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:3001/generate-quiz', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: textInput })
                });
                const data = await response.json();
                allQuizzes.push(data);
                localStorage.setItem('quizzes', JSON.stringify(allQuizzes));
                alert("Тест создан!");
                switchMode('student');
            } catch (e) {
                alert("Ошибка сервера!");
            } finally {
                btn.innerText = "СГЕНЕРИРОВАТЬ И ОПУБЛИКОВАТЬ";
                btn.disabled = false;
            }
        }

        function startQuiz(idx) {
            quiz = allQuizzes[idx];
            currentIdx = 0;
            score = 0;
            document.getElementById('student-list-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = quiz[currentIdx];
            document.getElementById('progress').innerText = `Вопрос ${currentIdx + 1}/${quiz.length}`;
            document.getElementById('question-text').innerText = q.question;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn p-4 text-left border-2 border-slate-100 rounded-2xl font-semibold hover:border-indigo-300 hover:bg-indigo-50";
                btn.innerText = opt;
                btn.onclick = () => selectAnswer(i, btn);
                grid.appendChild(btn);
            });
        }

        function selectAnswer(idx, btn) {
            const correctIdx = quiz[currentIdx].correct;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);
            if (idx === correctIdx) {
                btn.classList.add('correct');
                score++;
                document.getElementById('score-live').innerText = `Счет: ${score}`;
            } else {
                btn.classList.add('wrong');
                buttons[correctIdx].classList.add('correct');
            }

            setTimeout(() => {
                if (currentIdx + 1 < quiz.length) {
                    currentIdx++;
                    showQuestion();
                } else {
                    showFinal();
                }
            }, 1500);
        }

        function showFinal() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${userName}, твой результат: ${score} из ${quiz.length}`;

            // ЛОГИКА ТАБЛИЦЫ ЛИДЕРОВ
            let leaders = JSON.parse(localStorage.getItem('leaders')) || [];
            leaders.push({name: userName, points: score});
            leaders.sort((a, b) => b.points - a.points);
            leaders = leaders.slice(0, 10);
            localStorage.setItem('leaders', JSON.stringify(leaders));

            const board = document.getElementById('leaderboard');
            board.innerHTML = leaders.map((p, i) => `
                <div class="flex justify-between p-2 ${p.name === userName ? 'bg-indigo-50 rounded-lg' : ''}">
                    <span>${i+1}. <b>${p.name}</b></span>
                    <span class="text-indigo-600 font-bold">${p.points}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
